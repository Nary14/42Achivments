{% extends "base.html" %}

{% block title %}Accueil{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-slate-900">
    <div class="text-center px-4">
        <!-- 42 Logo -->
        <h2 class="text-8xl font-bold text-violet-500 mb-6">42</h2>
        
        <!-- Main Title -->
        <h1 class="text-4xl font-bold text-white mb-4">
            Achievements 42 Antananarivo
        </h1>
        
        <!-- Subtitle -->
        <p class="text-lg text-slate-300 mb-8">
            Réclamez vos achievements automatiquement
        </p>
        
        <!-- Login Button -->
        <a href="{{ url_for('auth.login') }}" class="inline-block px-8 py-4 bg-violet-500 hover:bg-violet-600 text-white font-bold text-lg rounded-lg transition mb-6">
            Se Connecter
        </a>
        
        <!-- Note -->
        <p class="text-sm text-slate-400">
            Connectez-vous avec votre compte intra 42
        </p>
    </div>
</div>
{% endblock %}
