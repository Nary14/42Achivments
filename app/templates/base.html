<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>42 Achievements | {% block title %}{% endblock %}</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
    <!-- Navigation Bar -->
    <nav class="bg-slate-800 shadow-lg border-b border-violet-500">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <!-- Logo -->
            <h1 class="text-2xl font-bold text-violet-500">42 Achievements</h1>
            
            <!-- User Menu -->
            <div class="flex items-center gap-4">
                {% if session.user_id %}
                    <!-- Display logged-in user info -->
                    <span class="text-slate-300">{{ session.get('user_login', 'User') }}</span>
                    <a href="{{ url_for('auth.logout') }}" class="px-4 py-2 bg-violet-500 hover:bg-violet-600 rounded transition">
                        Logout
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>
    
    <!-- Main Content Area -->
    <main class="min-h-screen">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="bg-slate-800 border-t border-slate-700 py-4 mt-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-slate-400">
            <p>42 Antananarivo</p>
        </div>
    </footer>
</body>
</html>
